<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAY — Creative Developer</title>
  <meta name="description" content="Creative Developer & Social Media Specialist. Merging functional code with high-impact visual narratives.">
  <link rel="stylesheet" href="styles/main.css?v=50">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- CINEMATIC INTRO -->
  <div class="loader" id="loader">
    <div class="loader-bg"></div>
    <div class="loader-particles" id="loader-particles"></div>
    <div class="loader-content" id="loader-content">
      <!-- Counter that becomes JAY -->
      <div class="intro-counter" id="intro-counter">00</div>
      <div class="intro-name" id="intro-name">JAY</div>
      <!-- Typing tagline -->
      <div class="intro-tagline" id="intro-tagline"></div>
      <!-- Thin line above and below -->
      <div class="intro-line-top" id="intro-line-top"></div>
      <div class="intro-line-bot" id="intro-line-bot"></div>
    </div>
  </div>

  <style>
    /* ===== COUNTER INTRO ===== */
    .intro-counter{
      font-family:'Outfit',sans-serif;
      font-size:clamp(4rem,14vw,9rem);
      font-weight:200;
      color:rgba(237,232,227,.15);
      letter-spacing:.05em;
      line-height:1;
      position:relative;z-index:2;
      transition:opacity .3s ease;
    }
    .intro-counter.flash{
      color:rgba(201,149,107,.8);
      text-shadow:0 0 60px rgba(201,149,107,.4),0 0 120px rgba(201,149,107,.1);
      transition:none;
    }
    .intro-counter.hide{opacity:0;position:absolute}

    .intro-name{
      font-family:'Cormorant Garamond',Georgia,serif;
      font-size:clamp(5rem,18vw,12rem);
      font-weight:600;line-height:1;
      color:rgba(201,149,107,.85);
      letter-spacing:.08em;
      position:relative;z-index:2;
      opacity:0;
      transform:scale(1.5);
      filter:blur(10px);
      transition:all .7s cubic-bezier(.25,.46,.45,.94);
      text-shadow:0 0 40px rgba(201,149,107,.15);
    }
    .intro-name.reveal{
      opacity:1;transform:scale(1);filter:blur(0);
    }

    .intro-tagline{
      font-family:'Space Grotesk',-apple-system,sans-serif;
      font-size:clamp(.5rem,1.1vw,.7rem);
      font-weight:300;
      letter-spacing:.6em;
      text-transform:uppercase;
      color:rgba(237,232,227,.4);
      min-height:1.2rem;
      position:relative;z-index:2;
      margin-top:.8rem;
      border-right:1px solid rgba(201,149,107,.4);
      padding-right:3px;
      animation:cursorPulse .7s step-end infinite;
    }
    .intro-tagline.done{border-right-color:transparent;animation:none}
    @keyframes cursorPulse{0%,100%{border-color:rgba(201,149,107,.4)}50%{border-color:transparent}}

    /* Decorative lines */
    .intro-line-top,.intro-line-bot{
      position:absolute;left:50%;transform:translateX(-50%);
      width:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(201,149,107,.3),transparent);
      transition:width .8s ease;
      z-index:1;
    }
    .intro-line-top{top:35%}
    .intro-line-bot{bottom:35%}
    .intro-line-top.expand,.intro-line-bot.expand{width:min(350px,70vw)}

    /* Exit: slide up */
    .loader.slide-exit{
      animation:slideExit 1s cubic-bezier(.7,0,.3,1) forwards;
    }
    @keyframes slideExit{
      0%{transform:translateY(0);opacity:1}
      100%{transform:translateY(-100%);opacity:0;visibility:hidden;pointer-events:none}
    }

    @media(max-width:768px){
      .intro-line-top{top:30%}
      .intro-line-bot{bottom:30%}
    }
  </style>


  <!-- PARALLAX PARTICLES — subtle depth layer -->
  <div class="parallax-particles" id="parallax-particles"></div>

  <!-- NAV — Classic 3-part layout -->
  <nav class="nav" id="nav">
    <a href="about.html" class="nav-link-left hover-glow-text">About Me</a>
    <div class="nav-center">
      <div class="nav-line"></div>
      <a href="contact.html" class="nav-center-text hover-glow-text">Services</a>
      <div class="nav-line"></div>
    </div>
    <a href="contact.html" class="nav-link-right hover-glow-text">Contact</a>
  </nav>

  <!-- HERO — Classic JAY with portrait -->
  <section class="hero" id="hero">
    <!-- Parallax background gradient layer -->
    <div class="hero-parallax-bg" id="hero-parallax-bg"></div>

    <div class="hero-inner">
      <div class="hero-letters">
        <span class="hero-letter-j">J</span>
        <span class="hero-letter-y">Y</span>
      </div>
      <div class="hero-portrait" id="hero-portrait">
        <div class="hero-glow"></div>
        <div class="hero-nen"></div>
        <img src="assets/images/hero-portrait.png" alt="Jay">
      </div>
      <!-- Step 5: Word-by-word animated tagline -->
      <div class="hero-tagline word-reveal" id="hero-tagline">
        <span class="tagline-word">C R E A T I V E</span>
        <span class="tagline-word">D E V E L O P E R</span>
      </div>
    </div>
  </section>

  <script src="scripts/main.js"></script>
</body>
</html>
