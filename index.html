  <!-- 3D GEOMETRIC BACKGROUND -->
  <script>
  (function(){
    const canvas = document.getElementById('hero3d');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H;
    let mouse = {x: 0.5, y: 0.5};
    let time = 0;

    function resize(){
      const parent = canvas.parentElement;
      W = canvas.width = parent.clientWidth;
      H = canvas.height = parent.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX / W;
      mouse.y = e.clientY / H;
    });

    // ===== FLOATING ORB LIGHTS =====
    class Orb {
      constructor(x, y, r, color){
        this.baseX = x;
        this.baseY = y;
        this.r = r;
        this.color = color;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = 0.3 + Math.random() * 0.4;
        this.ampX = 30 + Math.random() * 60;
        this.ampY = 20 + Math.random() * 40;
      }
      draw(t){
        const x = this.baseX + Math.sin(t * this.speed + this.phase) * this.ampX + (mouse.x - 0.5) * 50;
        const y = this.baseY + Math.cos(t * this.speed * 0.7 + this.phase) * this.ampY + (mouse.y - 0.5) * 30;
        const grad = ctx.createRadialGradient(x, y, 0, x, y, this.r);
        grad.addColorStop(0, this.color);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(x - this.r, y - this.r, this.r * 2, this.r * 2);
      }
    }

    const orbs = [
      new Orb(W * 0.2, H * 0.3, 300, 'rgba(201,149,107,0.07)'),
      new Orb(W * 0.8, H * 0.6, 350, 'rgba(201,149,107,0.05)'),
      new Orb(W * 0.5, H * 0.8, 280, 'rgba(140,100,70,0.06)'),
      new Orb(W * 0.7, H * 0.2, 250, 'rgba(180,130,90,0.04)'),
    ];

    // ===== 3D WIREFRAME SPHERE =====
    function drawWireframeSphere(cx, cy, radius, rotX, rotY, segments){
      ctx.strokeStyle = 'rgba(201,149,107,0.12)';
      ctx.lineWidth = 0.5;

      // Latitude lines
      for(let i = 1; i < segments; i++){
        const phi = (Math.PI * i) / segments;
        const r = radius * Math.sin(phi);
        const yOff = radius * Math.cos(phi);

        ctx.beginPath();
        for(let j = 0; j <= 60; j++){
          const theta = (Math.PI * 2 * j) / 60;
          let x3d = r * Math.cos(theta);
          let z3d = r * Math.sin(theta);
          let y3d = yOff;

          // Rotate Y
          const cosRY = Math.cos(rotY), sinRY = Math.sin(rotY);
          const tx = x3d * cosRY - z3d * sinRY;
          const tz = x3d * sinRY + z3d * cosRY;
          x3d = tx; z3d = tz;

          // Rotate X
          const cosRX = Math.cos(rotX), sinRX = Math.sin(rotX);
          const ty = y3d * cosRX - z3d * sinRX;
          z3d = y3d * sinRX + z3d * cosRX;
          y3d = ty;

          const scale = 800 / (800 + z3d);
          const sx = cx + x3d * scale;
          const sy = cy + y3d * scale;

          if(j === 0) ctx.moveTo(sx, sy);
          else ctx.lineTo(sx, sy);
        }
        ctx.stroke();
      }

      // Longitude lines
      for(let j = 0; j < segments; j++){
        const theta = (Math.PI * 2 * j) / segments;
        ctx.beginPath();
        for(let i = 0; i <= 40; i++){
          const phi = (Math.PI * i) / 40;
          let x3d = radius * Math.sin(phi) * Math.cos(theta);
          let z3d = radius * Math.sin(phi) * Math.sin(theta);
          let y3d = radius * Math.cos(phi);

          const cosRY = Math.cos(rotY), sinRY = Math.sin(rotY);
          const tx = x3d * cosRY - z3d * sinRY;
          const tz = x3d * sinRY + z3d * cosRY;
          x3d = tx; z3d = tz;

          const cosRX = Math.cos(rotX), sinRX = Math.sin(rotX);
          const ty = y3d * cosRX - z3d * sinRX;
          z3d = y3d * sinRX + z3d * cosRX;
          y3d = ty;

          const scale = 800 / (800 + z3d);
          const sx = cx + x3d * scale;
          const sy = cy + y3d * scale;

          if(i === 0) ctx.moveTo(sx, sy);
          else ctx.lineTo(sx, sy);
        }
        ctx.stroke();
      }
    }

    // ===== FLOATING PARTICLES =====
    const dots = [];
    for(let i = 0; i < 80; i++){
      dots.push({
        x: Math.random() * 2000 - 500,
        y: Math.random() * 1200 - 200,
        r: Math.random() * 1.5 + 0.3,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.2,
        alpha: Math.random() * 0.4 + 0.1
      });
    }

    // ===== HORIZONTAL SCAN LINE =====
    let scanY = 0;

    // ===== MAIN ANIMATE =====
    function animate(){
      time += 0.008;
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      // Draw gradient orbs
      ctx.globalCompositeOperation = 'lighter';
      orbs.forEach(o => {
        o.baseX = o.baseX; // keep relative
        o.draw(time);
      });
      ctx.globalCompositeOperation = 'source-over';

      // Draw wireframe sphere - right side
      drawWireframeSphere(
        W * 0.75 + (mouse.x - 0.5) * 30,
        H * 0.45 + (mouse.y - 0.5) * 20,
        Math.min(W, H) * 0.28,
        time * 0.3 + mouse.y * 0.5,
        time * 0.5 + mouse.x * 0.5,
        10
      );

      // Draw smaller wireframe sphere - left side
      drawWireframeSphere(
        W * 0.18 + (mouse.x - 0.5) * 20,
        H * 0.65 + (mouse.y - 0.5) * 15,
        Math.min(W, H) * 0.12,
        -time * 0.5,
        time * 0.8,
        6
      );

      // Draw floating dots
      ctx.globalAlpha = 1;
      dots.forEach(d => {
        d.x += d.vx;
        d.y += d.vy;
        if(d.x < -50) d.x = W + 50;
        if(d.x > W + 50) d.x = -50;
        if(d.y < -50) d.y = H + 50;
        if(d.y > H + 50) d.y = -50;

        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,149,107,${d.alpha})`;
        ctx.fill();
      });

      // Scan line effect
      scanY += 0.5;
      if(scanY > H) scanY = -20;
      ctx.fillStyle = 'rgba(201,149,107,0.02)';
      ctx.fillRect(0, scanY, W, 1);

      // Subtle vignette
      const vignette = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.9);
      vignette.addColorStop(0, 'transparent');
      vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
      ctx.fillStyle = vignette;
      ctx.fillRect(0, 0, W, H);

      requestAnimationFrame(animate);
    }

    animate();
  })();
  </script>
