<!DOCTYPE html>
<html lang="en">
<head>

  <title>JAY — Creative Developer Portfolio</title>
  <meta name="description" content="Jay is a creative developer building premium digital experiences with precision and passion.">
  <link rel="stylesheet" href="styles/main.css?v=12">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- NAV -->
  <nav class="navbar" id="navbar">
    <a href="about.html" target="_blank" class="nav-brand">About Me</a>
    <div class="nav-center" id="menu-trigger">
      <div class="nav-line"></div>
      <span class="nav-menu-text">Services</span>
      <div class="nav-line"></div>
    </div>
    <a href="#contact" class="nav-contact">Contact</a>
  </nav>

  <!-- FULLSCREEN MENU -->
  <div class="fullscreen-menu" id="fullscreen-menu">
    <button class="menu-close" id="menu-close">&times;</button>
    <div class="menu-links">
      <a href="#hero" class="menu-link">Home</a>

  <!-- HERO -->
  <section class="hero" id="hero">
    <!-- Layer 1: Giant JAY text behind person -->
    <div class="hero-name">
      <span class="hero-letter">J</span>
      <span class="hero-letter">A</span>
      <span class="hero-letter">Y</span>

    <!-- Layer 2: Person cutout in front -->
    <div class="hero-portrait">
      <img src="assets/images/hero-portrait.png" alt="Jay — Creative Developer">
    </div>

    <!-- Layer 3: Tagline at bottom -->
    <div class="hero-tagline">
      <span class="hero-tagline-role">Creative Developer & Social Media Specialist</span>
      <span class="hero-tagline-title">Web & Visual Specialist</span>
      <span class="hero-tagline-desc">Building functional websites and high-impact digital experiences.</span>

  </section>

  <script src="scripts/main.js"></script>
