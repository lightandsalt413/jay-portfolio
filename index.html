<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAY — Creative Developer</title>
  <meta name="description" content="Creative Developer & Social Media Specialist. Merging functional code with high-impact visual narratives.">
  <link rel="stylesheet" href="styles/main.css?v=97">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- CUSTOM CURSOR -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursor-dot"></div>


  <!-- MATRIX FALLING RAIN -->
  <canvas id="matrix-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:.18"></canvas>

  <!-- PARALLAX PARTICLES -->
  <div class="parallax-particles" id="parallax-particles"></div>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <a href="about.html" class="nav-link-left hover-glow-text">About Me</a>
    <div class="nav-center">
      <div class="nav-line"></div>
      <a href="contact.html" class="nav-center-text hover-glow-text">Services</a>
      <div class="nav-line"></div>
    </div>
    <a href="contact.html" class="nav-link-right hover-glow-text">Contact</a>
  </nav>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="hero-parallax-bg" id="hero-parallax-bg" data-parallax="0.4"></div>

    <!-- Cinematic vignette -->
    <div class="hero-vignette"></div>



    <!-- Side name badge -->
    <div class="hero-side-badge">Jay Ynclino · Portfolio 2025</div>

    <div class="hero-inner">
      <div class="hero-letters">
        <span class="hero-letter-j" data-parallax="-0.15">J</span>
        <span class="hero-letter-y" data-parallax="-0.1">Y</span>
      </div>
      <div class="hero-portrait" id="hero-portrait" data-parallax="-0.05">
        <div class="hero-glow"></div>
        <div class="hero-nen"></div>
        <img src="assets/images/hero-portrait.png" alt="Jay">
      </div>
    </div>

  </section>

  <script src="scripts/main.js"></script>

  <!-- MATRIX FALLING RAIN -->
  <script>
  (function(){
    const c=document.getElementById('matrix-canvas');
    if(!c)return;
    const ctx=c.getContext('2d');
    const chars='01{}[]()<>/\\|=+*~@#$%^&;:アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
    const fontSize=14;
    let columns,drops;

    function init(){
      c.width=window.innerWidth;
      c.height=window.innerHeight;
      columns=Math.floor(c.width/fontSize);
      drops=[];
      for(let i=0;i<columns;i++){
        drops[i]=Math.floor(Math.random()*-50);
      }
    }
    init();
    window.addEventListener('resize',init);

    function draw(){
      ctx.fillStyle='rgba(9,9,8,.08)';
      ctx.fillRect(0,0,c.width,c.height);
      ctx.font=fontSize+'px monospace';

      for(let i=0;i<columns;i++){
        const char=chars[Math.floor(Math.random()*chars.length)];
        const r=180+Math.floor(Math.random()*40);
        const g=130+Math.floor(Math.random()*30);
        const b=70+Math.floor(Math.random()*20);
        ctx.fillStyle='rgb('+r+','+g+','+b+')';
        ctx.fillText(char,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>c.height && Math.random()>0.975){
          drops[i]=0;
        }
        drops[i]++;
      }
    }

    setInterval(draw,40);
  })();
  </script>
</body>
</html>
