<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAY — Creative Developer</title>
  <meta name="description" content="Creative Developer & Social Media Specialist. Merging functional code with high-impact visual narratives.">
  <link rel="stylesheet" href="styles/main.css?v=30">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- CUSTOM CURSOR -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursor-dot"></div>

  <!-- GATE — Exclusive entry screen -->
  <div class="gate" id="gate">
    <div class="gate-scanline"></div>
    <div class="gate-content">
      <div class="gate-logo">J</div>
      <div class="gate-typing" id="gate-typing"></div>
      <div class="gate-sub">This portfolio is by invitation only.</div>
      <button class="gate-btn" id="gate-enter">
        <span class="gate-btn-text">Enter</span>
        <span class="gate-btn-line"></span>
      </button>
      <div class="gate-footnote">By entering, you acknowledge this is a curated experience.</div>
    </div>
  </div>

  <!-- NAV — Classic 3-part layout -->
  <nav class="nav" id="nav">
    <a href="about.html" target="_blank" class="nav-link-left">About Me</a>
    <div class="nav-center">
      <div class="nav-line"></div>
      <a href="#services" class="nav-center-text">Services</a>
      <div class="nav-line"></div>
    </div>
    <a href="contact.html" class="nav-link-right">Contact</a>
  </nav>

  <!-- HERO — Classic JAY with portrait -->
  <section class="hero" id="hero">
    <div class="hero-inner">
      <div class="hero-letters">
        <span class="hero-letter-j">J</span>
        <span class="hero-letter-y">Y</span>
      </div>
      <div class="hero-portrait" id="hero-portrait">
        <div class="hero-glow"></div>
        <img src="assets/images/hero-portrait.png" alt="Jay">
      </div>
      <div class="hero-tagline">CREATIVE DEVELOPER</div>
    </div>
    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-hint-line"></div>
    </div>
  </section>


  <script src="scripts/main.js"></script>
</body>
</html>
