<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAY — Creative Developer</title>
  <meta name="description" content="Creative Developer & Social Media Specialist. Merging functional code with high-impact visual narratives.">
  <link rel="stylesheet" href="styles/main.css?v=41">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- CV-STYLE PORTFOLIO ENTRANCE -->
  <div class="curtain active" id="curtain">
    <div class="curtain-left"></div>
    <div class="curtain-right"></div>
    <div class="curtain-center">
      <span class="cv-greeting" id="cv-greeting">Hello, I'm</span>
      <div class="cv-name" id="cv-name">
        <span class="char">J</span><span class="char">A</span><span class="char">Y</span>
      </div>
      <div class="cv-line"></div>
      <span class="cv-role" id="cv-role">Creative Developer &amp; Social Media Specialist</span>
      <div class="cv-stats" id="cv-stats">
        <div class="cv-stat"><span class="cv-stat-num">5+</span><span class="cv-stat-label">Projects</span></div>
        <div class="cv-stat"><span class="cv-stat-num">3+</span><span class="cv-stat-label">Years Exp</span></div>
        <div class="cv-stat"><span class="cv-stat-num">100%</span><span class="cv-stat-label">Passion</span></div>
      </div>
    </div>
  </div>
  <div class="film-grain" id="film-grain"></div>

  <!-- PARALLAX PARTICLES — subtle depth layer -->
  <div class="parallax-particles" id="parallax-particles"></div>

  <!-- NAV — Classic 3-part layout -->
  <nav class="nav" id="nav">
    <a href="about.html" class="nav-link-left hover-glow-text">About Me</a>
    <div class="nav-center">
      <div class="nav-line"></div>
      <a href="contact.html" class="nav-center-text hover-glow-text">Services</a>
      <div class="nav-line"></div>
    </div>
    <a href="contact.html" class="nav-link-right hover-glow-text">Contact</a>
  </nav>

  <!-- HERO — Classic JAY with portrait -->
  <section class="hero" id="hero">
    <!-- Parallax background gradient layer -->
    <div class="hero-parallax-bg" id="hero-parallax-bg"></div>

    <div class="hero-inner">
      <div class="hero-letters">
        <span class="hero-letter-j">J</span>
        <span class="hero-letter-y">Y</span>
      </div>
      <div class="hero-portrait" id="hero-portrait">
        <div class="hero-glow"></div>
        <img src="assets/images/hero-portrait.png" alt="Jay">
      </div>
      <!-- Step 5: Word-by-word animated tagline -->
      <div class="hero-tagline word-reveal" id="hero-tagline">
        <span class="tagline-word">C R E A T I V E</span>
        <span class="tagline-word">D E V E L O P E R</span>
      </div>
    </div>
  </section>

  <script src="scripts/main.js"></script>
</body>
</html>
