  <!-- AURORA WAVE 3D BACKGROUND -->
  <script>
  (function(){
    const canvas = document.getElementById('hero3d');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H, time = 0;
    let mouse = {x: 0.5, y: 0.5};

    function resize(){
      const p = canvas.parentElement;
      W = canvas.width = p.clientWidth;
      H = canvas.height = p.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX / W;
      mouse.y = e.clientY / H;
    });

    // ===== AURORA WAVE RIBBONS =====
    function drawWave(yBase, amp, freq, speed, color, lw){
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = lw;
      for(let x = 0; x <= W; x += 3){
        const y = yBase
          + Math.sin(x * freq + time * speed) * amp
          + Math.sin(x * freq * 0.5 + time * speed * 1.3) * amp * 0.5
          + (mouse.y - 0.5) * 30;
        if(x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // ===== MESH GRID FLOOR =====
    function drawGrid(){
      const rows = 15;
      const cols = 30;
      const horizon = H * 0.55;
      const depth = H * 0.5;

      ctx.strokeStyle = 'rgba(100,140,200,0.06)';
      ctx.lineWidth = 0.5;

      // Horizontal lines
      for(let i = 0; i <= rows; i++){
        const t = i / rows;
        const y = horizon + t * t * depth;
        ctx.beginPath();
        const spread = 1 + t * 2;
        ctx.moveTo(W/2 - W * spread / 2, y);
        ctx.lineTo(W/2 + W * spread / 2, y);
        ctx.stroke();
      }

      // Vertical lines
      for(let j = 0; j <= cols; j++){
        const xFrac = j / cols - 0.5;
        ctx.beginPath();
        for(let i = 0; i <= rows; i++){
          const t = i / rows;
          const y = horizon + t * t * depth;
          const spread = 1 + t * 2;
          const x = W/2 + xFrac * W * spread;
          if(i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    // ===== STAR FIELD =====
    const stars = [];
    for(let i = 0; i < 120; i++){
      stars.push({
        x: Math.random() * 2000,
        y: Math.random() * 1000,
        r: Math.random() * 1.2 + 0.2,
        twinkle: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 2
      });
    }

    // ===== MAIN ANIMATE =====
    function animate(){
      time += 0.012;

      // Clear with dark navy
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#080d18';
      ctx.fillRect(0, 0, W, H);

      // Subtle top gradient glow
      const topGlow = ctx.createRadialGradient(W*0.5, H*0.15, 0, W*0.5, H*0.15, H*0.7);
      topGlow.addColorStop(0, 'rgba(60,90,160,0.08)');
      topGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = topGlow;
      ctx.fillRect(0, 0, W, H);

      // Gold center glow
      const goldGlow = ctx.createRadialGradient(W*0.45, H*0.5, 0, W*0.45, H*0.5, H*0.5);
      goldGlow.addColorStop(0, 'rgba(201,149,107,0.04)');
      goldGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = goldGlow;
      ctx.fillRect(0, 0, W, H);

      // Draw perspective grid
      drawGrid();

      // Draw aurora waves
      for(let i = 0; i < 6; i++){
        const yBase = H * 0.2 + i * H * 0.08;
        const hue = 200 + i * 15;
        const alpha = 0.06 - i * 0.005;
        drawWave(yBase, 25 + i * 8, 0.003 - i * 0.0002, 0.8 + i * 0.15,
          `hsla(${hue},60%,55%,${alpha})`, 1.5 - i * 0.1);
      }

      // Gold accent waves
      for(let i = 0; i < 3; i++){
        const yBase = H * 0.6 + i * H * 0.06;
        drawWave(yBase, 15 + i * 5, 0.004, 1.2 + i * 0.2,
          `rgba(201,149,107,${0.07 - i * 0.015})`, 1);
      }

      // Stars
      stars.forEach(s => {
        const flicker = 0.4 + Math.sin(time * s.speed + s.twinkle) * 0.4;
        ctx.beginPath();
        ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,210,240,${flicker * 0.5})`;
        ctx.fill();
      });

      // Vignette
      const vig = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.95);
      vig.addColorStop(0, 'transparent');
      vig.addColorStop(1, 'rgba(8,13,24,0.5)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      requestAnimationFrame(animate);
    }

    animate();
  })();
  </script>
