<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAY — Creative Developer</title>
  <meta name="description" content="Creative Developer & Social Media Specialist. Merging functional code with high-impact visual narratives.">
  <link rel="stylesheet" href="styles/main.css?v=50">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    /* "Hello, I'm" greeting above hero letters */
    .hero-greeting{
      position:absolute;
      top:22%;
      left:50%;
      transform:translateX(-50%);
      z-index:3;
      text-align:center;
      opacity:0;
      animation:greetingFadeIn 1.2s ease forwards;
      animation-delay:5s;
    }
    .hero-greeting-text{
      font-family:'Cormorant Garamond',Georgia,serif;
      font-size:clamp(1rem,2vw,1.4rem);
      font-weight:300;
      font-style:italic;
      color:rgba(237,232,227,.45);
      letter-spacing:.15em;
      white-space:nowrap;
    }
    .hero-greeting-name{
      display:block;
      font-family:'Cormorant Garamond',Georgia,serif;
      font-size:clamp(1.2rem,2.5vw,1.8rem);
      font-weight:400;
      font-style:italic;
      color:rgba(201,149,107,.6);
      letter-spacing:.1em;
      margin-top:.3rem;
    }
    @keyframes greetingFadeIn{
      0%{opacity:0;transform:translateX(-50%) translateY(10px)}
      100%{opacity:1;transform:translateX(-50%) translateY(0)}
    }
    @media(max-width:768px){
      .hero-greeting{top:18%}
    }
  </style>
</head>
<body>

  <!-- LOADING SCREEN -->
  <div class="loader" id="loader">
    <div class="loader-bg"></div>
    <div class="loader-particles" id="loader-particles"></div>
    <div class="loader-content">
      <span class="loader-line1" id="loader-line1"></span>
      <div class="loader-name" id="loader-name">
        <span class="loader-char" data-i="0">J</span>
        <span class="loader-char" data-i="1">A</span>
        <span class="loader-char" data-i="2">Y</span>
      </div>
      <div class="loader-glow" id="loader-glow"></div>
      <span class="loader-line2" id="loader-line2">Welcome to my Portfolio</span>
    </div>
  </div>


  <!-- PARALLAX PARTICLES — subtle depth layer -->
  <div class="parallax-particles" id="parallax-particles"></div>

  <!-- NAV — Classic 3-part layout -->
  <nav class="nav" id="nav">
    <a href="about.html" class="nav-link-left hover-glow-text">About Me</a>
    <div class="nav-center">
      <div class="nav-line"></div>
      <a href="contact.html" class="nav-center-text hover-glow-text">Services</a>
      <div class="nav-line"></div>
    </div>
    <a href="contact.html" class="nav-link-right hover-glow-text">Contact</a>
  </nav>

  <!-- HERO — Classic JAY with portrait -->
  <section class="hero" id="hero">
    <!-- Parallax background gradient layer -->
    <div class="hero-parallax-bg" id="hero-parallax-bg"></div>

    <div class="hero-inner">
      <!-- "Hello, I'm" greeting -->
      <div class="hero-greeting">
        <span class="hero-greeting-text">Hello, I'm</span>
        <span class="hero-greeting-name">Jay</span>
      </div>
      <div class="hero-letters">
        <span class="hero-letter-j">J</span>
        <span class="hero-letter-y">Y</span>
      </div>
      <div class="hero-portrait" id="hero-portrait">
        <div class="hero-glow"></div>
        <div class="hero-nen"></div>
        <img src="assets/images/hero-portrait.png" alt="Jay">
      </div>
      <!-- Step 5: Word-by-word animated tagline -->
      <div class="hero-tagline word-reveal" id="hero-tagline">
        <span class="tagline-word">C R E A T I V E</span>
        <span class="tagline-word">D E V E L O P E R</span>
      </div>
    </div>
  </section>

  <script src="scripts/main.js"></script>
</body>
</html>
