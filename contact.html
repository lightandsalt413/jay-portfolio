  <section class="contact-wrap">
    <div class="contact-inner">
      <span class="contact-label rv">Let's Connect</span>
      <h1 class="contact-title rv d1">Ready to elevate<br>your brand?</h1>
      <p class="contact-sub rv d2">"Every great project starts with a <span>conversation.</span>"</p>
      <form class="form rv d3" id="contact-form" action="https://formspree.io/f/xpwrjpbj" method="POST">
        <div class="form-group"><label class="form-label" for="name">Your Name</label><input class="form-input" type="text" id="name" name="name" placeholder="John Doe" required></div>
        <div class="form-group"><label class="form-label" for="email">Your Email</label><input class="form-input" type="email" id="email" name="email" placeholder="john@example.com" required></div>
        <div class="form-group"><label class="form-label" for="message">Your Message</label><textarea class="form-textarea" id="message" name="message" placeholder="Tell me about your project..." required></textarea></div>
        <button class="form-btn" type="submit">Send Message</button>
      </form>
      <div class="form-ok" id="form-ok"><div class="form-ok-icon">✦</div><p class="form-ok-text">Message sent successfully.</p></div>
      <div class="socials rv d4">
        <a href="https://github.com/lightandsalt413" target="_blank" class="social">GitHub</a>
        <a href="mailto:lightandsalt413@gmail.com" class="social">Email</a>
        <a href="https://lightandsalt413.github.io/jay-portfolio/" class="social">Portfolio</a>
      </div>
    </div>
