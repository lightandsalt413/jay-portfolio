<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — JAY</title>
  <meta name="description" content="Get in touch with Jay for web development, creative direction, or social media projects. Let's build something remarkable.">
  <link rel="stylesheet" href="styles/main.css?v=71">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    .contact-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 2rem 6rem;background:var(--navy)}
    .contact-inner{max-width:600px;width:100%;text-align:center}
    .contact-label{display:inline-block;font-family:var(--sans);font-size:.65rem;font-weight:400;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem}
    .contact-title{font-family:var(--serif);font-size:clamp(2rem,5vw,3.5rem);font-weight:400;color:var(--white);line-height:1.2;margin-bottom:1.5rem;letter-spacing:.01em}
    .contact-subtitle{font-family:var(--serif);font-size:1.1rem;font-style:italic;line-height:1.8;color:var(--gray);margin-bottom:4rem}
    .contact-subtitle span{color:var(--gold)}

    /* Form */
    .contact-form{display:flex;flex-direction:column;gap:1.5rem;text-align:left}
    .form-group{display:flex;flex-direction:column;gap:.5rem}
    .form-label{font-family:var(--sans);font-size:.6rem;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
    .form-input,.form-textarea{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:0;padding:1rem 1.2rem;font-family:var(--sans);font-size:.9rem;color:var(--white);letter-spacing:.03em;transition:border-color .4s,box-shadow .4s;outline:none}
    .form-input:focus,.form-textarea:focus{border-color:rgba(255,215,0,.3);box-shadow:0 0 20px rgba(255,215,0,.05)}
    .form-input::placeholder,.form-textarea::placeholder{color:var(--gray2);font-style:italic}
    .form-textarea{min-height:150px;resize:vertical}

    .form-submit{align-self:center;margin-top:1rem;padding:1rem 3rem;background:transparent;border:1px solid rgba(255,215,0,.3);color:var(--gold);font-family:var(--sans);font-size:.7rem;font-weight:400;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:all .4s ease}
    .form-submit:hover{background:rgba(255,215,0,.08);border-color:var(--gold);box-shadow:0 0 30px rgba(255,215,0,.1);transform:translateY(-2px)}

    /* Success state */
    .form-success{display:none;text-align:center;padding:3rem}
    .form-success.active{display:block}
    .form-success-icon{font-size:3rem;margin-bottom:1.5rem}
    .form-success-text{font-family:var(--serif);font-size:1.3rem;color:var(--white);font-style:italic}
    .form-success-sub{font-family:var(--sans);font-size:.7rem;color:var(--gray2);letter-spacing:.15em;margin-top:1rem}

    /* Socials */
    .contact-socials{display:flex;justify-content:center;gap:3rem;margin-top:4rem;padding-top:3rem;border-top:1px solid rgba(255,255,255,.04)}
    .social-link{font-family:var(--sans);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);transition:color .3s}
    .social-link:hover{color:var(--gold)}

    @media(max-width:600px){
      .contact-page{padding:100px 1.5rem 4rem}
      .contact-socials{flex-direction:column;gap:1.5rem;align-items:center}
    }

    /* Disable entrance transitions — instant load for Contact page */
    .reveal,.reveal-left,.reveal-right,.reveal-scale{opacity:1!important;transform:none!important;transition:none!important}
    .reveal.active,.reveal-left.active,.reveal-right.active,.reveal-scale.active{opacity:1!important;transform:none!important}
    .word-reveal .word{opacity:1!important;transform:none!important;transition:none!important}
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursor-dot"></div>

  <nav class="nav" id="nav">
    <a href="index.html" class="nav-link-left">Back Home</a>
    <div class="nav-center">
      <div class="nav-line"></div>
      <span class="nav-center-text">Connect</span>
      <div class="nav-line"></div>
    </div>
    <a href="about.html" class="nav-link-right">About</a>
  </nav>

  <section class="contact-page">
    <div class="contact-inner">
      <span class="contact-label reveal">Let's Connect</span>
      <h1 class="contact-title reveal">Ready to elevate your brand?</h1>
      <p class="contact-subtitle reveal">"Every great project starts with a <span>conversation.</span>"</p>

      <!-- Form -->
      <form class="contact-form reveal" id="contact-form" action="https://formspree.io/f/xpwrjpbj" method="POST">
        <div class="form-group">
          <label class="form-label" for="name">Your Name</label>
          <input class="form-input" type="text" id="name" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Your Email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="message">Your Message</label>
          <textarea class="form-textarea" id="message" name="message" placeholder="Tell me about your project..." required></textarea>
        </div>
        <button class="form-submit" type="submit">Send Message</button>
      </form>

      <!-- Success Message -->
      <div class="form-success" id="form-success">
        <div class="form-success-icon">✦</div>
        <p class="form-success-text">Message sent successfully.</p>
        <p class="form-success-sub">I'll get back to you within 24 hours.</p>
      </div>

      <!-- Social Links -->
      <div class="contact-socials reveal">
        <a href="https://github.com/lightandsalt413" target="_blank" class="social-link">GitHub</a>
        <a href="mailto:lightandsalt413@gmail.com" class="social-link">Email</a>
        <a href="https://lightandsalt413.github.io/jay-portfolio/" class="social-link">Portfolio</a>
      </div>
    </div>
  </section>

  <script src="scripts/main.js"></script>
  <script>
    // Formspree AJAX submission
    const form = document.getElementById('contact-form');
    const success = document.getElementById('form-success');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = new FormData(form);
        try {
          const res = await fetch(form.action, {
            method: 'POST',
            body: data,
            headers: { 'Accept': 'application/json' }
          });
          if (res.ok) {
            form.style.display = 'none';
            success.classList.add('active');
          }
        } catch (err) {
          // Fallback: submit normally
          form.submit();
        }
      });
    }
  </script>
</body>
</html>
