<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — JAY</title>
  <meta name="description" content="Get in touch with Jay for web development, creative direction, or social media projects. Let's build something remarkable.">
  <link rel="stylesheet" href="styles/main.css?v=50">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    /* Disable entrance transitions */
    .reveal,.reveal-left,.reveal-right,.reveal-scale{opacity:1!important;transform:none!important;transition:none!important}
    .reveal.active,.reveal-left.active,.reveal-right.active,.reveal-scale.active{opacity:1!important;transform:none!important}
    .word-reveal .word{opacity:1!important;transform:none!important;transition:none!important}

    /* ===== CONTACT PAGE — Premium styling ===== */
    .contact-page{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:120px 2rem 6rem;
      background:
        radial-gradient(ellipse at 50% 20%,rgba(201,149,107,.06) 0%,transparent 55%),
        radial-gradient(ellipse at 20% 80%,rgba(201,149,107,.03) 0%,transparent 40%),
        radial-gradient(ellipse at 80% 60%,rgba(120,100,80,.03) 0%,transparent 40%),
        linear-gradient(180deg,#090909 0%,#0c0a08 50%,#090909 100%);
      position:relative;overflow:hidden;
    }
    .contact-page::before{
      content:'';position:absolute;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity:.4;pointer-events:none;z-index:0;
    }
    .contact-inner{max-width:600px;width:100%;text-align:center;position:relative;z-index:1}
    .contact-label{display:inline-block;font-family:var(--sans);font-size:.65rem;font-weight:400;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem;text-shadow:0 0 15px rgba(201,149,107,.2)}
    .contact-title{font-family:var(--serif);font-size:clamp(2rem,5vw,3.5rem);font-weight:400;color:var(--white);line-height:1.2;margin-bottom:1.5rem;letter-spacing:.01em}
    .contact-subtitle{font-family:var(--serif);font-size:1.1rem;font-style:italic;line-height:1.8;color:rgba(200,195,188,.6);margin-bottom:4rem}
    .contact-subtitle span{color:var(--gold);text-shadow:0 0 12px rgba(201,149,107,.25)}

    /* Form */
    .contact-form{display:flex;flex-direction:column;gap:1.8rem;text-align:left}
    .form-group{display:flex;flex-direction:column;gap:.6rem}
    .form-label{font-family:var(--sans);font-size:.6rem;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
    .form-input,.form-textarea{
      background:rgba(201,149,107,.02);
      border:1px solid rgba(201,149,107,.1);
      border-radius:2px;
      padding:1.1rem 1.3rem;
      font-family:var(--sans);font-size:.9rem;color:var(--white);
      letter-spacing:.03em;
      transition:border-color .4s,box-shadow .4s,background .4s;
      outline:none;
    }
    .form-input:focus,.form-textarea:focus{
      border-color:rgba(201,149,107,.4);
      box-shadow:0 0 25px rgba(201,149,107,.08),inset 0 0 20px rgba(201,149,107,.02);
      background:rgba(201,149,107,.04);
    }
    .form-input::placeholder,.form-textarea::placeholder{color:rgba(138,130,120,.35);font-style:italic}
    .form-textarea{min-height:150px;resize:vertical}

    .form-submit{
      align-self:center;margin-top:1.5rem;
      padding:1.1rem 3.5rem;
      background:transparent;
      border:1px solid rgba(201,149,107,.35);
      color:var(--gold);
      font-family:var(--sans);font-size:.7rem;font-weight:400;
      letter-spacing:.3em;text-transform:uppercase;
      cursor:pointer;
      position:relative;overflow:hidden;
      transition:all .5s ease;
    }
    .form-submit::before{
      content:'';position:absolute;inset:0;
      background:var(--gold);
      transform:translateY(100%);
      transition:transform .4s ease;z-index:0;
    }
    .form-submit:hover::before{transform:translateY(0)}
    .form-submit:hover{color:var(--navy);border-color:var(--gold);box-shadow:0 0 40px rgba(201,149,107,.15)}
    .form-submit span,.form-submit{position:relative;z-index:1}

    /* Success state */
    .form-success{display:none;text-align:center;padding:3rem}
    .form-success.active{display:block}
    .form-success-icon{font-size:3rem;margin-bottom:1.5rem;color:var(--gold)}
    .form-success-text{font-family:var(--serif);font-size:1.3rem;color:var(--white);font-style:italic}
    .form-success-sub{font-family:var(--sans);font-size:.7rem;color:var(--gray2);letter-spacing:.15em;margin-top:1rem}

    /* Socials */
    .contact-socials{display:flex;justify-content:center;gap:3rem;margin-top:4rem;padding-top:3rem;border-top:1px solid rgba(201,149,107,.08)}
    .social-link{
      font-family:var(--sans);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--gray);transition:all .4s ease;
      position:relative;
    }
    .social-link::after{
      content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;
      background:var(--gold);transition:width .3s ease;
    }
    .social-link:hover{color:var(--gold);text-shadow:0 0 10px rgba(201,149,107,.2)}
    .social-link:hover::after{width:100%}

    @media(max-width:600px){
      .contact-page{padding:100px 1.5rem 4rem}
      .contact-socials{flex-direction:column;gap:1.5rem;align-items:center}
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursor-dot"></div>

  <nav class="nav" id="nav">
    <a href="index.html" class="nav-link-left">Back Home</a>
    <div class="nav-center">
      <div class="nav-line"></div>
      <span class="nav-center-text">Connect</span>
      <div class="nav-line"></div>
    </div>
    <a href="about.html" class="nav-link-right">About</a>
  </nav>

  <section class="contact-page">
    <div class="contact-inner">
      <span class="contact-label reveal">Let's Connect</span>
      <h1 class="contact-title reveal">Ready to elevate your brand?</h1>
      <p class="contact-subtitle reveal">"Every great project starts with a <span>conversation.</span>"</p>

      <!-- Form -->
      <form class="contact-form reveal" id="contact-form" action="https://formspree.io/f/xpwrjpbj" method="POST">
        <div class="form-group">
          <label class="form-label" for="name">Your Name</label>
          <input class="form-input" type="text" id="name" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Your Email</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="message">Your Message</label>
          <textarea class="form-textarea" id="message" name="message" placeholder="Tell me about your project..." required></textarea>
        </div>
        <button class="form-submit" type="submit">Send Message</button>
      </form>

      <!-- Success Message -->
      <div class="form-success" id="form-success">
        <div class="form-success-icon">✦</div>
        <p class="form-success-text">Message sent successfully.</p>
        <p class="form-success-sub">I'll get back to you within 24 hours.</p>
      </div>

      <!-- Social Links -->
      <div class="contact-socials reveal">
        <a href="https://github.com/lightandsalt413" target="_blank" class="social-link">GitHub</a>
        <a href="mailto:lightandsalt413@gmail.com" class="social-link">Email</a>
        <a href="https://lightandsalt413.github.io/jay-portfolio/" class="social-link">Portfolio</a>
      </div>
    </div>
  </section>

  <script src="scripts/main.js"></script>
  <script>
    // Formspree AJAX submission
    const form = document.getElementById('contact-form');
    const success = document.getElementById('form-success');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = new FormData(form);
        try {
          const res = await fetch(form.action, {
            method: 'POST',
            body: data,
            headers: { 'Accept': 'application/json' }
          });
          if (res.ok) {
            form.style.display = 'none';
            success.classList.add('active');
          }
        } catch (err) {
          // Fallback: submit normally
          form.submit();
        }
      });
    }
  </script>
</body>
</html>
